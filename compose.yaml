services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_VERSION: "1.26"
    image: go-clean-api:local
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      APP_NAME: go-clean-api
      APP_VERSION: v0.1.0
      APP_ENV: production

      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      HTTP_SHUTDOWN_TIMEOUT_SECONDS: "${HTTP_SHUTDOWN_TIMEOUT_SECONDS:-10}"

      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"

      CORS_ENABLED: "${CORS_ENABLED:-true}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:4200}"
      CORS_ALLOWED_METHODS: "${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}"
      CORS_ALLOWED_HEADERS: "${CORS_ALLOWED_HEADERS:-Content-Type,Authorization,X-Request-ID}"
      CORS_MAX_AGE_SECONDS: "${CORS_MAX_AGE_SECONDS:-600}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped